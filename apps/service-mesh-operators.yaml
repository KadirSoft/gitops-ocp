apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-mesh-operators
  namespace: openshift-gitops
spec:
  project: lab
  source:
    repoURL: https://github.com/KadirSoft/gitops-ocp
    targetRevision: main
    path: manifests/service-mesh/operators
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
