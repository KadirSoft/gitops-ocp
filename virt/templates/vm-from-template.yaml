apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel9-gitops-vm
  namespace: vms
  labels:
    app: rhel9-gitops-vm
spec:
  running: true

  # ── Instancetype and Preference ──────────────────────────────────────────
  # These two lines replace ~20 lines of hardcoded CPU/RAM/device config
  instancetype:
    kind: VirtualMachineClusterInstancetype
    name: u1.medium          # 1 vCPU, 4Gi RAM — general purpose

  preference:
    kind: VirtualMachineClusterPreference
    name: rhel.9             # virtio disk/NIC, UEFI secure boot, RNG — all handled

  template:
    metadata:
      labels:
        kubevirt.io/domain: rhel9-gitops-vm
    spec:
      evictionStrategy: LiveMigrate
      terminationGracePeriodSeconds: 180

      networks:
        - name: default
          pod: {}

      volumes:
        - name: rootdisk
          dataVolume:
            name: rhel9-gitops-vm-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: cloud-user
              password: redhat123
              chpasswd:
                expire: false

      domain:
        devices:
          disks:
            - name: rootdisk
              disk: {}
              bootOrder: 1
            - name: cloudinitdisk
              disk: {}
          interfaces:
            - name: default
              masquerade: {}

  dataVolumeTemplates:
    - metadata:
        name: rhel9-gitops-vm-rootdisk
      spec:
        storage:
          storageClassName: ocs-storagecluster-ceph-rbd-virtualization
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 30Gi
        source:
          snapshot:
            namespace: openshift-virtualization-os-images
            name: rhel9-ab4ec16077fe
